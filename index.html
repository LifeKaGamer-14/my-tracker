<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2216%22 fill=%22%23000%22/><text y=%22.9em%22 font-size=%2280%22>🎮</text></svg>">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ultimate Planner: Habits & Studies</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap');
    
    :root {
      --bg: #f8f7f4; --surface: #fff; --border: #e2e0d9; --accent: #3d6b4f;
      --accent2: #c97d3e; --text: #1a1a18; --muted: #7a7870; --cell: 28px;
      --chart-grid: rgba(0,0,0,0.05);
    }

    [data-theme="dark"] {
      --bg: #121212; --surface: #1e1e1e; --border: #333; --accent: #82b394;
      --accent2: #e09d62; --text: #e0e0e0; --muted: #a0a0a0;
      --chart-grid: rgba(255,255,255,0.1);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; transition: background 0.2s, color 0.2s; }
    body { background: var(--bg); font-family: 'Syne', sans-serif; color: var(--text); padding: 1.5rem; }
    h1 { font-size: 24px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 2px;}
    .creator-tag { font-size: 11px; font-family: 'DM Mono', monospace; color: var(--accent); font-weight: 500; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px;}
    .sub { font-size: 13px; color: var(--muted); font-family: 'DM Mono', monospace; }
    
    .header-row { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 12px; }
    .controls { display: flex; gap: 8px; align-items: center; flex-wrap: wrap;}
    
    .btn { border: 0.5px solid var(--border); border-radius: 6px; padding: 8px 14px; font-size: 13px; background: var(--surface); color: var(--text); cursor: pointer; font-family: 'Syne', sans-serif; font-weight: 500; }
    .btn:hover { background: var(--bg); }
    .btn-accent { border: none; background: var(--accent); color: white; }
    .btn-accent:hover { background: var(--accent); opacity: 0.9; }
    .btn-google { background: #4285F4; color: white; border: none; display: flex; align-items: center; gap: 5px;}
    .btn-google:hover { background: #357ae8; }
    .user-info { font-size: 12px; font-family: 'DM Mono'; color: var(--accent); display: none; background: rgba(61, 107, 79, 0.1); padding: 6px 12px; border-radius: 20px;}
    
    /* Dropdown specific */
    select.btn { appearance: none; -webkit-appearance: none; padding-right: 25px; background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%237a7870%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E"); background-repeat: no-repeat; background-position: right 10px top 50%; background-size: 10px auto; }
    [data-theme="dark"] select.btn { background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%23a0a0a0%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E"); }

    /* Main Tabs */
    .main-tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid var(--border); padding-bottom: 10px; overflow-x: auto; }
    .main-tab { background: none; border: none; font-family: 'Syne'; font-size: 16px; font-weight: 600; color: var(--muted); cursor: pointer; padding: 5px 10px; white-space: nowrap; }
    .main-tab.active { color: var(--accent); border-bottom: 3px solid var(--accent); margin-bottom: -12px; }

    .view-section { display: none; animation: fadeIn 0.3s; }
    .view-section.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    /* Habit Tracker Styles */
    .tracker-wrap { overflow-x: auto; margin-bottom: 1.5rem; border-radius: 8px; border: 0.5px solid var(--border); }
    table.grid { border-collapse: collapse; min-width: 100%; background: var(--surface); }
    table.grid th, table.grid td { border: 0.5px solid var(--border); font-size: 11px; font-family: 'DM Mono', monospace; color: var(--text); }
    table.grid thead th { background: var(--surface); color: var(--muted); padding: 8px 2px; }
    table.grid thead th.habit-col { text-align: left; padding: 10px; min-width: 180px; font-family: 'Syne', sans-serif; font-size: 12px; }
    
    .habit-name input { border: none; outline: none; background: transparent; font-size: 13px; font-family: 'Syne', sans-serif; color: var(--text); width: 100%; }
    .day-cell { text-align: center; cursor: pointer; height: var(--cell); min-width: var(--cell); }
    .day-cell.done { background: var(--accent); opacity: 0.3; position: relative; }
    .day-cell.done::after { content: '✓'; position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); color: var(--text); font-weight: 700; opacity: 1; }
    
    .stat-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 1.5rem; }
    .stat { background: var(--surface); border: 0.5px solid var(--border); border-radius: 12px; padding: 16px; }
    .stat .s-val { font-size: 24px; font-weight: 700; color: var(--accent); }
    .charts-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1rem; }
    .chart-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: 12px; padding: 1rem; }

    /* Study Tracker Styles */
    .sub-tabs { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
    .sub-tab { padding: 6px 14px; border-radius: 20px; background: var(--surface); border: 1px solid var(--border); cursor: pointer; font-size: 13px; font-weight: 500; }
    .sub-tab.active { background: var(--accent); color: white; border-color: var(--accent); }
    
    .study-dashboard { display: grid; grid-template-columns: 250px 1fr; gap: 20px; }
    
    .study-chart-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: 12px; padding: 1.5rem; text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .pie-container { height: 180px; width: 100%; position: relative; display: flex; justify-content: center; margin-top: 15px; }
    
    .study-table-wrap { background: var(--surface); border: 0.5px solid var(--border); border-radius: 12px; overflow: hidden; }
    .study-table { width: 100%; border-collapse: collapse; }
    .study-table th, .study-table td { border-bottom: 0.5px solid var(--border); border-right: 0.5px solid var(--border); padding: 12px; font-size: 13px; text-align: left; }
    .study-table th { background: #fafafa; font-family: 'DM Mono'; font-size: 11px; color: var(--muted); text-transform: uppercase; }
    [data-theme="dark"] .study-table th { background: #252525; }
    .study-table td:last-child, .study-table th:last-child { border-right: none; }
    .study-table tr:last-child td { border-bottom: none; }
    
    .chapter-input { border: none; background: transparent; font-family: inherit; font-size: 13px; color: var(--text); width: 100%; outline: none; padding: 4px; margin: -4px; border-radius: 4px; transition: 0.2s ease; }
    .chapter-input:hover, .chapter-input:focus { background: var(--bg); }
    .chapter-input:focus { color: var(--accent); border-bottom: 1px dashed var(--accent); border-radius: 4px 4px 0 0; }
    
    .study-check { text-align: center; cursor: pointer; width: 70px; font-weight: bold; }
    .study-check.done { background: rgba(61, 107, 79, 0.15); color: var(--accent); }
    .study-check.done::after { content: '✓'; }
    .empty-state { padding: 40px; text-align: center; color: var(--muted); font-size: 14px; font-style: italic; }
    .toolbar { padding: 15px; border-bottom: 0.5px solid var(--border); display: flex; justify-content: flex-end; }

    /* =========================================
       MOBILE & RESPONSIVE ENHANCEMENTS 
       ========================================= */
    @media (max-width: 768px) {
      /* 1. Stack header and controls for better spacing */
      .header-row {
        flex-direction: column;
        align-items: flex-start;
        gap: 16px;
      }
      .controls {
        width: 100%;
        justify-content: space-between;
      }

      /* 2. Improve Main Tabs for touch screens */
      .main-tabs {
        padding-bottom: 15px; 
        -webkit-overflow-scrolling: touch; /* Smooth scrolling on iOS */
      }
      .main-tab {
        font-size: 14px;
        padding: 8px 12px;
      }

      /* 3. Make the Habit Tracker "Sticky" */
      .tracker-wrap {
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        border-radius: 8px;
        box-shadow: inset -10px 0 10px -10px rgba(0,0,0,0.1);
      }
      table.grid th.habit-col, 
      table.grid td.habit-name {
        position: sticky;
        left: 0;
        z-index: 2;
        background: var(--surface); /* Inherits theme background */
        box-shadow: 2px 0 5px rgba(0,0,0,0.05);
      }
      
      /* 4. Optimize the Study Dashboard */
      .study-dashboard {
        grid-template-columns: 1fr; /* Stacks chart above the table */
      }
      .study-table th, 
      .study-table td {
        padding: 10px 6px; /* Reduce padding slightly */
        font-size: 12px;
      }
      .study-check {
        width: 45px; /* Compress the checkbox columns so the chapter name has room */
      }
      .chapter-input {
        font-size: 12px;
      }
      
      /* 5. Adjust Charts and Stats */
      .charts-row {
        grid-template-columns: 1fr;
      }
      .stat-row {
        grid-template-columns: 1fr 1fr; /* 2 stats per row instead of wrapping weirdly */
      }
    }
  </style>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
</head>

<body>
  <div class="header-row">
    <div>
      <h1>Console & Campus</h1>
      <div class="creator-tag">Created by FARHAN HAIDER KHAN / LIFEKAGAMER</div>
      <p class="sub">Dashboard: Habits, Boards & Prep.</p>
    </div>

    <div class="controls">
      <span id="userInfo" class="user-info">Not Logged In</span>
      <button class="btn btn-accent" id="forceSyncBtn" style="display:none;">☁️ Sync Data</button>
      <button class="btn btn-google" id="loginBtn">Log in to Sync</button>
      <button class="btn" id="logoutBtn" style="display:none;">Log Out</button>
      
      <select id="examTargetSelect" class="btn" onchange="switchExamTrack(this.value)">
        <option value="JEE">Target: JEE (PCM)</option>
        <option value="NEET">Target: NEET (PCB)</option>
      </select>

      <button class="btn" id="themeToggle">🌓</button>
    </div>
  </div>

  <div class="main-tabs">
    <button class="main-tab active" onclick="setMainTab('Habits')">Habit Tracker</button>
    <button class="main-tab" onclick="setMainTab('ISC Class 11')">ISC Class 11</button>
    <button class="main-tab" onclick="setMainTab('ISC Class 12')">ISC Class 12</button>
    
    <button class="main-tab exam-jee" onclick="setMainTab('Mains')">JEE Mains</button>
    <button class="main-tab exam-jee" onclick="setMainTab('Advanced')">JEE Advanced</button>
    
    <button class="main-tab exam-neet" onclick="setMainTab('NEET')" style="display:none;">NEET Tracker</button>
  </div>

  <div id="view-Habits" class="view-section active">
    <div class="header-row" style="margin-bottom: 10px;">
      <h2 style="font-size:18px;">Monthly Habits</h2>
      <div class="controls">
        <button class="btn" id="prevM">←</button>
        <span id="monthLabel" style="font-family:'DM Mono'; font-size:14px; width:120px; text-align:center;"></span>
        <button class="btn" id="nextM">→</button>
        <button class="btn btn-accent" id="addHabit">+ New Habit</button>
      </div>
    </div>
    
    <div class="stat-row" id="statsRow">
      <div class="stat"><div class="sub">Total Checks</div><div class="s-val" id="stTotalChecks">0</div></div>
      <div class="stat"><div class="sub">Active Habits</div><div class="s-val" id="stBestStreak">0</div></div>
      <div class="stat"><div class="sub">Avg Completion</div><div class="s-val" id="stAvgComp" style="color:var(--accent2)">0%</div></div>
    </div>

    <div class="tracker-wrap">
      <table class="grid" id="habitGrid">
        <thead><tr id="gridHead"></tr></thead>
        <tbody id="gridBody"></tbody>
      </table>
    </div>

    <div class="charts-row">
      <div class="chart-card"><canvas id="lineChart"></canvas></div>
      <div class="chart-card"><canvas id="barChart" style="display:none;"></canvas></div> 
    </div>
  </div>

  <div id="view-Study" class="view-section">
    <div class="sub-tabs" id="subTabsContainer"></div>
    
    <div class="study-dashboard">
      <div class="study-chart-card">
        <h3 style="font-size:16px;" id="chartTitle">Subject Progress</h3>
        <div class="sub">Theory, Ex, PYQ, Rev</div>
        <div class="pie-container"><canvas id="studyPieChart"></canvas></div>
      </div>
      
      <div class="study-table-wrap">
        <div class="toolbar">
          <button class="btn btn-accent" onclick="addChapter()">+ Add Chapter</button>
        </div>
        <table class="study-table">
          <thead>
            <tr>
              <th>Chapter Name</th>
              <th class="study-check">Theory</th>
              <th class="study-check">Exercise</th>
              <th class="study-check">PYQs</th>
              <th class="study-check">Revised</th>
            </tr>
          </thead>
          <tbody id="studyTableBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <script>

  /* =========================================
     1. FIREBASE CONFIGURATION
     ========================================= */
  const firebaseConfig = {
    apiKey: "AIzaSyCRY2_VP9x9fbjbe8uSu5g7jI99bDD8-lg",
    authDomain: "console-and-campus.firebaseapp.com",
    projectId: "console-and-campus",
    storageBucket: "console-and-campus.firebasestorage.app",
    messagingSenderId: "502820469967",
    appId: "1:502820469967:web:3adf1795a11e65ba348bba",
    measurementId: "G-JGNP68098P"
  };

  let auth, db, currentUser = null;
  try {
    firebase.initializeApp(firebaseConfig);
    auth = firebase.auth();
    db = firebase.firestore();
  } catch (e) {
    console.log("Firebase not configured properly.");
  }

  /* --- STATE MANAGEMENT --- */
  let currentMainTab = 'Habits'; 
  let currentSubTab = 'Physics';
  let currentExamTrack = localStorage.getItem('examTrack') || 'JEE';

  // Default Data Templates
  const isc11Syllabus = {
    Physics: ["Physical World and Measurement", "Kinematics", "Laws of Motion", "Work, Energy and Power", "Motion of System of Particles and Rigid Body", "Gravitation", "Properties of Bulk Matter", "Thermodynamics", "Behaviour of Perfect Gases and Kinetic Theory of Gases", "Oscillations and Waves"],
    Chemistry: ["Some Basic Concepts of Chemistry", "Structure of Atom", "Classification of Elements and Periodicity", "Chemical Bonding and Molecular Structure", "States of Matter: Gases and Liquids", "Chemical Thermodynamics", "Equilibrium", "Redox Reactions", "Hydrogen", "s-Block Elements", "Some p-Block Elements", "Organic Chemistry - Basic Principles and Techniques", "Hydrocarbons", "Environmental Chemistry"],
    Maths: ["Sets and Functions", "Relations and Functions", "Trigonometry", "Principle of Mathematical Induction", "Complex Numbers and Quadratic Equations", "Linear Inequalities", "Permutations and Combinations", "Binomial Theorem", "Sequence and Series", "Straight Lines", "Conic Sections", "Introduction to 3D Geometry", "Limits and Derivatives", "Mathematical Reasoning", "Statistics", "Probability"],
    Biology: ["Diversity of Living Organisms", "Structural Organisation in Animals and Plants", "Cell: Structure and Function", "Plant Physiology", "Human Physiology"]
  };

  const isc12Syllabus = {
    Physics: ["Electrostatics", "Current Electricity", "Magnetic Effects of Current and Magnetism", "Electromagnetic Induction and Alternating Currents", "Electromagnetic Waves", "Optics", "Dual Nature of Radiation and Matter", "Atoms and Nuclei", "Electronic Devices"],
    Chemistry: ["Solid State", "Solutions", "Electrochemistry", "Chemical Kinetics", "Surface Chemistry", "General Principles and Processes of Isolation of Elements", "p-Block Elements", "d- and f- Block Elements", "Coordination Compounds", "Haloalkanes and Haloarenes", "Alcohols, Phenols and Ethers", "Aldehydes, Ketones and Carboxylic Acids", "Organic Compounds containing Nitrogen", "Biomolecules", "Polymers", "Chemistry in Everyday Life"],
    Maths: ["Relations and Functions", "Inverse Trigonometric Functions", "Matrices", "Determinants", "Continuity and Differentiability", "Applications of Derivatives", "Integrals", "Differential Equations", "Probability", "Vectors", "Three-Dimensional Geometry", "Applications of Integrals", "Linear Regression"],
    Biology: ["Reproduction", "Genetics and Evolution", "Biology and Human Welfare", "Biotechnology and its Applications", "Ecology and Environment"]
  };
  
  const neetSyllabus = {
    Physics: ["Physical World and Measurement", "Kinematics", "Laws of Motion", "Work, Energy and Power", "Motion of System of Particles and Rigid Body", "Gravitation", "Properties of Bulk Matter", "Thermodynamics", "Behaviour of Perfect Gases and Kinetic Theory of Gases", "Oscillations and Waves", "Electrostatics", "Current Electricity", "Magnetic Effects of Current and Magnetism", "Electromagnetic Induction and Alternating Currents", "Electromagnetic Waves", "Optics", "Dual Nature of Radiation and Matter", "Atoms and Nuclei", "Electronic Devices"],
    Chemistry: ["Some Basic Concepts of Chemistry", "Structure of Atom", "Classification of Elements and Periodicity", "Chemical Bonding and Molecular Structure", "Thermodynamics", "Equilibrium", "Redox Reactions", "p-Block Elements", "d- and f-Block Elements", "Coordination Compounds", "Organic Chemistry - Basic Principles and Techniques", "Hydrocarbons", "Haloalkanes and Haloarenes", "Alcohols, Phenols and Ethers", "Aldehydes, Ketones and Carboxylic Acids", "Organic Compounds containing Nitrogen", "Biomolecules"],
    Biology: ["Diversity in Living World", "Structural Organisation in Animals and Plants", "Cell Structure and Function", "Plant Physiology", "Human Physiology", "Reproduction", "Genetics and Evolution", "Biology and Human Welfare", "Biotechnology and Its Applications", "Ecology and Environment"]
  };

  const defaultStudyData = {
    'ISC Class 11': JSON.parse(JSON.stringify(isc11Syllabus)),
    'ISC Class 12': JSON.parse(JSON.stringify(isc12Syllabus)),
    Mains: { Physics: ["Units and Measurements", "Kinematics"], Chemistry: ["Some Basic Concepts in Chemistry"], Maths: ["Sets, Relations and Functions"] },
    Advanced: { Physics: ["Mechanics"], Chemistry: ["Physical Chemistry"], Maths: ["Algebra"] },
    NEET: JSON.parse(JSON.stringify(neetSyllabus))
  };

  // Load Initial Offline Data
  let habits = JSON.parse(localStorage.getItem('habits')) || ['Morning workout', 'Read 20 pages'];
  let habitChecks = JSON.parse(localStorage.getItem('habitChecks')) || {};
  let studyData = JSON.parse(localStorage.getItem('studyDataV3')) || defaultStudyData;
  let studyChecks = JSON.parse(localStorage.getItem('studyChecksV3')) || {};
  
  // Inject missing chapters into older saves to prevent errors
  if (!studyData.NEET) studyData.NEET = JSON.parse(JSON.stringify(neetSyllabus));
  if (!studyData['ISC Class 11'].Biology) studyData['ISC Class 11'].Biology = [...isc11Syllabus.Biology];
  if (!studyData['ISC Class 12'].Biology) studyData['ISC Class 12'].Biology = [...isc12Syllabus.Biology];
  if (!studyData['ISC Class 12'].Maths) studyData['ISC Class 12'].Maths = [...isc12Syllabus.Maths];

  const now = new Date();
  let viewYear = now.getFullYear(), viewMonth = now.getMonth();

  /* =========================================
     2. SYNC LOGIC
     ========================================= */
  function saveData() {
    localStorage.setItem('habits', JSON.stringify(habits));
    localStorage.setItem('habitChecks', JSON.stringify(habitChecks));
    localStorage.setItem('studyDataV3', JSON.stringify(studyData));
    localStorage.setItem('studyChecksV3', JSON.stringify(studyChecks));
    localStorage.setItem('examTrack', currentExamTrack);

    if(currentUser && db) {
      db.collection('users').doc(currentUser.uid).set({
        habits: habits,
        habitChecks: habitChecks,
        studyData: studyData,
        studyChecks: studyChecks,
        examTrack: currentExamTrack,
        lastUpdated: firebase.firestore.FieldValue.serverTimestamp()
      }).catch(error => console.error("Background sync error:", error));
    }
  }

  if(auth) {
    document.getElementById('forceSyncBtn').onclick = () => {
      if(currentUser && db) {
        document.getElementById('forceSyncBtn').innerText = "Syncing...";
        db.collection('users').doc(currentUser.uid).set({
          habits: habits,
          habitChecks: habitChecks,
          studyData: studyData,
          studyChecks: studyChecks,
          examTrack: currentExamTrack,
          lastUpdated: firebase.firestore.FieldValue.serverTimestamp()
        }).then(() => {
          document.getElementById('forceSyncBtn').innerText = "☁️ Sync Data";
          alert("✅ Data successfully synced to: " + currentUser.email);
        }).catch(error => {
          document.getElementById('forceSyncBtn').innerText = "☁️ Sync Data";
          alert("Error syncing data: " + error.message);
        });
      }
    };

    auth.onAuthStateChanged(user => {
      if (user) {
        currentUser = user;
        document.getElementById('loginBtn').style.display = 'none';
        document.getElementById('logoutBtn').style.display = 'inline-block';
        document.getElementById('forceSyncBtn').style.display = 'inline-block';
        
        const emailBox = document.getElementById('userInfo');
        emailBox.style.display = 'inline-block';
        emailBox.innerText = `Logged in: ${user.email}`;

        db.collection('users').doc(user.uid).get().then(doc => {
          if (doc.exists) {
            const data = doc.data();
            if(data.habits) habits = data.habits;
            if(data.habitChecks) habitChecks = data.habitChecks;
            if(data.studyData) {
              studyData = data.studyData;
              if (!studyData.NEET) studyData.NEET = JSON.parse(JSON.stringify(neetSyllabus));
              if (!studyData['ISC Class 11'].Biology) studyData['ISC Class 11'].Biology = [...isc11Syllabus.Biology];
              if (!studyData['ISC Class 12'].Biology) studyData['ISC Class 12'].Biology = [...isc12Syllabus.Biology];
              if (!studyData['ISC Class 12'].Maths) studyData['ISC Class 12'].Maths = [...isc12Syllabus.Maths];
            }
            if(data.studyChecks) studyChecks = data.studyChecks;
            if(data.examTrack) {
              currentExamTrack = data.examTrack;
              switchExamTrack(currentExamTrack);
            }
            
            localStorage.setItem('habits', JSON.stringify(habits));
            localStorage.setItem('habitChecks', JSON.stringify(habitChecks));
            localStorage.setItem('studyDataV3', JSON.stringify(studyData));
            localStorage.setItem('studyChecksV3', JSON.stringify(studyChecks));
            localStorage.setItem('examTrack', currentExamTrack);

            if(currentMainTab === 'Habits') renderHabits(); else renderStudy();
          }
        });
      } else {
        currentUser = null;
        document.getElementById('loginBtn').style.display = 'inline-block';
        document.getElementById('logoutBtn').style.display = 'none';
        document.getElementById('forceSyncBtn').style.display = 'none';
        document.getElementById('userInfo').style.display = 'none';
      }
    });

    document.getElementById('loginBtn').onclick = () => {
      const provider = new firebase.auth.GoogleAuthProvider();
      auth.signInWithPopup(provider).catch(error => alert("Login failed: " + error.message));
    };

    document.getElementById('logoutBtn').onclick = () => {
      auth.signOut();
      alert("Logged out. Changes will now only save to this device.");
    };
  }

  /* --- TAB ROUTING & PREFERENCES --- */
  function switchExamTrack(track) {
    currentExamTrack = track;
    document.getElementById('examTargetSelect').value = track;
    saveData();
    
    // Toggle Competitive Tabs
    if (track === 'JEE') {
      document.querySelectorAll('.exam-jee').forEach(el => el.style.display = 'inline-block');
      document.querySelectorAll('.exam-neet').forEach(el => el.style.display = 'none');
      if (currentMainTab === 'NEET') setMainTab('Mains');
    } else {
      document.querySelectorAll('.exam-jee').forEach(el => el.style.display = 'none');
      document.querySelectorAll('.exam-neet').forEach(el => el.style.display = 'inline-block');
      if (currentMainTab === 'Mains' || currentMainTab === 'Advanced') setMainTab('NEET');
    }
    
    // Refresh to handle Math/Bio visibility
    if (currentMainTab !== 'Habits') renderStudy();
  }

  function setMainTab(tab) {
    currentMainTab = tab;
    document.querySelectorAll('.main-tab').forEach(b => b.classList.toggle('active', b.innerText.includes(tab)));
    
    if (tab === 'Habits') {
      document.getElementById('view-Habits').classList.add('active');
      document.getElementById('view-Study').classList.remove('active');
      renderHabits();
    } else {
      document.getElementById('view-Habits').classList.remove('active');
      document.getElementById('view-Study').classList.add('active');
      renderStudy();
    }
  }

  function setSubTab(sub) { currentSubTab = sub; renderStudy(); }

  function addSubject() {
    const sub = prompt(`Add new subject to ${currentMainTab}:`);
    if(sub && sub.trim() !== '') {
      studyData[currentMainTab][sub.trim()] = [];
      currentSubTab = sub.trim();
      saveData(); renderStudy();
    }
  }

  function addChapter() {
    const ch = prompt(`Add chapter to ${currentMainTab} - ${currentSubTab}:`);
    if(ch && ch.trim() !== '') {
      studyData[currentMainTab][currentSubTab].push(ch.trim());
      saveData(); renderStudy();
    }
  }

  function updateChapterName(oldName, newName) {
    const trimmed = newName.trim();
    if (!trimmed || trimmed === oldName) return;
    const idx = studyData[currentMainTab][currentSubTab].indexOf(oldName);
    if (idx !== -1) {
      studyData[currentMainTab][currentSubTab][idx] = trimmed;
      ['Theory','Ex','PYQ','Rev'].forEach(col => {
        const oldKey = `${currentMainTab}-${currentSubTab}-${oldName}-${col}`;
        const newKey = `${currentMainTab}-${currentSubTab}-${trimmed}-${col}`;
        if (studyChecks[oldKey] !== undefined) {
          studyChecks[newKey] = studyChecks[oldKey];
          delete studyChecks[oldKey];
        }
      });
      saveData(); renderStudy();
    }
  }

  function toggleStudyCheck(chapter, col) {
    const key = `${currentMainTab}-${currentSubTab}-${chapter}-${col}`;
    studyChecks[key] = !studyChecks[key];
    saveData(); renderStudy();
  }

  /* --- HABIT TRACKER LOGIC --- */
  function hKey(hIdx, d) { return `${viewYear}-${viewMonth}-${hIdx}-${d}`; }
  function daysInMonth(y, m) { return new Date(y, m+1, 0).getDate(); }

  function renderHabits() {
    const tot = daysInMonth(viewYear, viewMonth);
    const head = document.getElementById('gridHead');
    head.innerHTML = '<th class="habit-col">Habit</th>' + Array.from({length:tot}, (_,i)=>`<th>${i+1}</th>`).join('') + '<th>%</th>';
    
    const body = document.getElementById('gridBody');
    body.innerHTML = '';
    habits.forEach((h, i) => {
      const tr = document.createElement('tr');
      let row = `<td class="habit-name"><input value="${h}" onchange="updateHabitName(${i}, this.value)"></td>`;
      let doneCount = 0;
      for(let d=1; d<=tot; d++) {
        const isDone = habitChecks[hKey(i,d)];
        if(isDone) doneCount++;
        row += `<td class="day-cell ${isDone?'done':''}" onclick="toggleHabitCell(${i},${d})"></td>`;
      }
      row += `<td style="text-align:center; font-weight:700;">${Math.round(doneCount/tot*100) || 0}%</td>`;
      tr.innerHTML = row;
      body.appendChild(tr);
    });
    document.getElementById('monthLabel').textContent = `${new Intl.DateTimeFormat('en-US', {month:'short'}).format(new Date(viewYear, viewMonth))} '${String(viewYear).slice(2)}`;
    updateHabitStats();
    renderHabitCharts();
  }

  function updateHabitName(i, val) { habits[i] = val; saveData(); renderHabits(); }
  function toggleHabitCell(i, d) { const k = hKey(i,d); habitChecks[k] = !habitChecks[k]; saveData(); renderHabits(); }

  let hLineC;
  function renderHabitCharts() {
    const tot = daysInMonth(viewYear, viewMonth);
    const dailyData = Array.from({length:tot}, (_,d)=> habits.filter((_,i)=>habitChecks[hKey(i,d+1)]).length);
    if(hLineC) hLineC.destroy();
    hLineC = new Chart(document.getElementById('lineChart'), {
      type: 'line',
      data: { labels: Array.from({length:tot},(_,i)=>i+1), datasets: [{ label: 'Daily Completion', data: dailyData, borderColor: '#3d6b4f', backgroundColor: 'rgba(61, 107, 79, 0.1)', fill: true, tension: 0.3 }] },
      options: { plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } } }
    });
  }

  function updateHabitStats() {
    let total = 0;
    for(let k in habitChecks) if(habitChecks[k]) total++;
    document.getElementById('stTotalChecks').textContent = total;
    document.getElementById('stBestStreak').textContent = habits.length;
    const totPossible = daysInMonth(viewYear, viewMonth) * habits.length;
    let curMonthDone = 0;
    for(let i=0; i<habits.length; i++){
        for(let d=1; d<=daysInMonth(viewYear, viewMonth); d++){
            if(habitChecks[hKey(i,d)]) curMonthDone++;
        }
    }
    document.getElementById('stAvgComp').textContent = totPossible ? Math.round((curMonthDone/totPossible)*100) + '%' : '0%';
  }

  /* --- STUDY TRACKER LOGIC --- */
  let studyPie;
  function renderStudy() {
    let subjects = Object.keys(studyData[currentMainTab] || {});
    
    // Filter out Biology/Maths dynamically based on exam track
    if (currentMainTab === 'ISC Class 11' || currentMainTab === 'ISC Class 12') {
      if (currentExamTrack === 'NEET') {
        subjects = subjects.filter(sub => sub !== 'Maths');
      } else {
        subjects = subjects.filter(sub => sub !== 'Biology');
      }
    }

    if (!subjects.includes(currentSubTab) && subjects.length > 0) {
      currentSubTab = subjects[0];
    }

    const subContainer = document.getElementById('subTabsContainer');
    subContainer.innerHTML = subjects.map(sub => 
      `<div class="sub-tab ${sub === currentSubTab ? 'active' : ''}" onclick="setSubTab('${sub}')">${sub}</div>`
    ).join('') + `<div class="sub-tab" style="background:transparent; border-style:dashed;" onclick="addSubject()">+ Subject</div>`;

    document.getElementById('chartTitle').textContent = `${currentSubTab} Progress`;
    const chapters = (studyData[currentMainTab] && studyData[currentMainTab][currentSubTab]) ? studyData[currentMainTab][currentSubTab] : [];
    const tbody = document.getElementById('studyTableBody');
    if (chapters.length === 0) {
      tbody.innerHTML = `<tr><td colspan="5"><div class="empty-state">No chapters added yet.</div></td></tr>`;
    } else {
      tbody.innerHTML = chapters.map(ch => {
        const escapedCh = ch.replace(/"/g, '&quot;');
        return `
        <tr>
          <td><input type="text" class="chapter-input" value="${escapedCh}" onchange="updateChapterName('${escapedCh}', this.value)"></td>
          ${['Theory','Ex','PYQ','Rev'].map(col => `
            <td class="study-check ${studyChecks[`${currentMainTab}-${currentSubTab}-${ch}-${col}`] ? 'done' : ''}" 
                onclick="toggleStudyCheck('${escapedCh}', '${col}')"></td>
          `).join('')}
        </tr>
      `}).join('');
    }

    let totalItems = chapters.length * 4;
    let doneItems = 0;
    chapters.forEach(ch => {
      ['Theory','Ex','PYQ','Rev'].forEach(col => {
        if(studyChecks[`${currentMainTab}-${currentSubTab}-${ch}-${col}`]) doneItems++;
      });
    });

    const percent = totalItems === 0 ? 0 : Math.round((doneItems/totalItems)*100);
    if(studyPie) studyPie.destroy();
    const ctx = document.getElementById('studyPieChart');
    studyPie = new Chart(ctx, {
      type: 'doughnut',
      data: {
        datasets: [{
          data: [percent, 100-percent],
          backgroundColor: ['#3d6b4f', getComputedStyle(document.body).getPropertyValue('--border')],
          borderWidth: 0
        }]
      },
      options: { cutout: '75%', plugins: { tooltip: {enabled: false} } },
      plugins: [{
        id: 'textCenter',
        beforeDraw: function(chart) {
          var width = chart.width, height = chart.height, ctx = chart.ctx;
          ctx.restore();
          var fontSize = (height / 114).toFixed(2);
          ctx.font = "bold " + fontSize + "em Syne";
          ctx.textBaseline = "middle";
          ctx.fillStyle = getComputedStyle(document.body).getPropertyValue('--text');
          var text = percent + "%", textX = Math.round((width - ctx.measureText(text).width) / 2), textY = height / 2;
          ctx.fillText(text, textX, textY);
          ctx.save();
        }
      }]
    });
  }

  /* --- EVENT LISTENERS & INIT --- */
  document.getElementById('themeToggle').onclick = () => {
    const theme = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', theme);
    if(currentMainTab === 'Habits') { renderHabits(); } else { renderStudy(); }
  };

  document.getElementById('addHabit').onclick = () => { habits.push('New Habit'); saveData(); renderHabits(); };
  document.getElementById('prevM').onclick = () => { viewMonth--; if(viewMonth<0){viewMonth=11; viewYear--;} renderHabits(); };
  document.getElementById('nextM').onclick = () => { viewMonth++; if(viewMonth>11){viewMonth=0; viewYear++;} renderHabits(); };

  // Run on Boot
  switchExamTrack(currentExamTrack);
  setMainTab('Habits');

  </script>
</body>
</html>
